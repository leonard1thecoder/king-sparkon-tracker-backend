apiVersion: apps/v1
kind: Deployment
metadata:
  name: king-sparkon-tracker-backend
  namespace: king-sparkon
  labels:
    app.kubernetes.io/name: king-sparkon-tracker-backend
    app.kubernetes.io/part-of: king-sparkon-tracker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: king-sparkon-tracker-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: king-sparkon-tracker-backend
        app.kubernetes.io/part-of: king-sparkon-tracker
    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          image: africa-south1-docker.pkg.dev/PROJECT_ID/king-sparkon-tracker/king-sparkon-tracker-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: king-sparkon-backend-config
            - secretRef:
                name: king-sparkon-backend-secrets
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
