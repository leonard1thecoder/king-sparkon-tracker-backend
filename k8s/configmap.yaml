apiVersion: v1
kind: ConfigMap
metadata:
  name: king-sparkon-backend-config
  namespace: king-sparkon
  labels:
    app.kubernetes.io/name: king-sparkon-tracker-backend
data:
  SPRING_PROFILES_ACTIVE: "prod,redis"
  SERVER_PORT: "8080"
  PORT: "8080"
  RATE_LIMIT_BACKEND: "redis"

  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "never"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_MAIL_ENABLED: "true"
  MANAGEMENT_HEALTH_REDIS_ENABLED: "false"

  CORS_ALLOWED_ORIGINS: "https://YOUR_FRONTEND_DOMAIN"
  CORS_ALLOWED_ORIGIN_PATTERNS: ""
  CORS_ALLOWED_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
  CORS_ALLOWED_HEADERS: "Authorization,Content-Type,Accept,Origin,X-Requested-With"
  CORS_EXPOSED_HEADERS: "Authorization"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_MAX_AGE_SECONDS: "3600"

  FRONTEND_RESET_PASSWORD_URL: "https://YOUR_FRONTEND_DOMAIN/reset-password"
  FRONTEND_EMAIL_VERIFICATION_URL: "https://YOUR_FRONTEND_DOMAIN/verify-email"
  FRONTEND_LOGIN_URL: "https://YOUR_FRONTEND_DOMAIN/login"

  TIPS_PAYPAL_ONBOARDING_URL: "https://YOUR_FRONTEND_DOMAIN/dashboard/owner/tips/paypal/onboarding"
  TIPS_WORKER_TIP_URL_TEMPLATE: "https://YOUR_FRONTEND_DOMAIN/tips/workers/{workerId}"
  TRANSACTIONS_PAYPAL_ONBOARDING_URL: "https://YOUR_FRONTEND_DOMAIN/dashboard/owner/transactions/paypal/onboarding"

  APP_GOOGLE_STORAGE_ENABLED: "true"
  APP_GOOGLE_STORAGE_PROJECT_ID: "project-a3605d87-a822-4c2a-b51"
  APP_GOOGLE_STORAGE_BUCKET_NAME: "king-sparkon-tracker-images"
  APP_GOOGLE_STORAGE_PUBLIC_BASE_URL: "https://storage.googleapis.com/king-sparkon-tracker-images"
  APP_GOOGLE_STORAGE_ROOT_FOLDER: "king-sparkon-tracker"
  APP_GOOGLE_STORAGE_MAKE_PUBLIC: "false"
  APP_GOOGLE_STORAGE_REJECT_EXTERNAL_IMAGE_URLS: "true"
  APP_GOOGLE_STORAGE_MAX_FILE_SIZE_BYTES: "5242880"

  PAYPAL_BASE_URL: "https://api-m.paypal.com"
  PAYPAL_CLIENT_ID: "YOUR_PAYPAL_CLIENT_ID"
  PAYPAL_RETURN_URL: "https://YOUR_FRONTEND_DOMAIN/billing/return"
  PAYPAL_CANCEL_URL: "https://YOUR_FRONTEND_DOMAIN/billing/cancel"

  STRIPE_SUCCESS_URL: "https://YOUR_FRONTEND_DOMAIN/dashboard/owner?billing=stripe-success"
  STRIPE_CANCEL_URL: "https://YOUR_FRONTEND_DOMAIN?billing=stripe-cancelled"

  APP_MAIL_ENABLED: "true"
  APP_MAIL_FROM: "no-reply@kingsparkon-tracker.com"
  CONTACT_NOTIFICATION_EMAIL: "support@kingsparkon-tracker.com"
  MAIL_HOST: "smtp-relay.brevo.com"
  MAIL_PORT: "587"
  MAIL_SMTP_AUTH: "true"
  MAIL_SMTP_STARTTLS_ENABLE: "true"
  MAIL_SMTP_STARTTLS_REQUIRED: "true"

  SPRING_DATA_REDIS_HOST: "YOUR_REDIS_HOST"
  SPRING_DATA_REDIS_PORT: "6379"
  REDIS_TIMEOUT: "2s"

  JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
