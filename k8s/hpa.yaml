apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: king-sparkon-tracker-backend
  namespace: king-sparkon
  labels:
    app.kubernetes.io/name: king-sparkon-tracker-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: king-sparkon-tracker-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
