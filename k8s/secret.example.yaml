apiVersion: v1
kind: Secret
metadata:
  name: king-sparkon-backend-secrets
  namespace: king-sparkon
  labels:
    app.kubernetes.io/name: king-sparkon-tracker-backend
type: Opaque
stringData:
  SUPABASE_DB_URL: "jdbc:postgresql://YOUR_DB_HOST:6543/postgres?prepareThreshold=0"
  SUPABASE_DB_USER: "postgres.YOUR_PROJECT_REF"
  SUPABASE_DB_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_WITH_LONG_RANDOM_VALUE"
  STRIPE_SECRET_KEY: "REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME"
  PAYPAL_CLIENT_SECRET: "REPLACE_ME"
  PAYPAL_WEBHOOK_ID: "REPLACE_ME"
  MAIL_PASSWORD: "REPLACE_ME"
  TWILIO_AUTH_TOKEN: "REPLACE_ME"
  SPRING_DATA_REDIS_PASSWORD: "REPLACE_ME"
