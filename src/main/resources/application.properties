spring.application.name=backend
server.forward-headers-strategy=framework
spring.threads.virtual.enabled=true
spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.cache.type=${SPRING_CACHE_TYPE:simple}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.document-title=King Sparkon Tracker API Docs
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=${MANAGEMENT_HEALTH_PROBES_ENABLED:true}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
management.health.livenessstate.enabled=${MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:true}
management.health.readinessstate.enabled=${MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:true}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
app.concurrency.stock-locking=pessimistic-write
app.security.h2-console-enabled=${H2_CONSOLE_ENABLED:false}
app.security.public-admin-registration-enabled=${PUBLIC_ADMIN_REGISTRATION_ENABLED:false}
app.jwt.secret=${JWT_SECRET:${APP_JWT_SECRET:change-before-run}}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
logging.level.root=INFO
logging.level.com.king_sparkon_tracker.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] requestId=%X{requestId} %logger{36} - %msg%n

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE_SECONDS:3600}

app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.backend=${RATE_LIMIT_BACKEND:memory}
app.rate-limit.public-auth.limit=${RATE_LIMIT_PUBLIC_AUTH_LIMIT:10}
app.rate-limit.public-auth.window-seconds=${RATE_LIMIT_PUBLIC_AUTH_WINDOW_SECONDS:60}
app.rate-limit.public-auth.retry-after-seconds=${RATE_LIMIT_PUBLIC_AUTH_RETRY_AFTER_SECONDS:60}
app.rate-limit.ai-chat.limit=${RATE_LIMIT_AI_CHAT_LIMIT:20}
app.rate-limit.ai-chat.window-seconds=${RATE_LIMIT_AI_CHAT_WINDOW_SECONDS:60}
app.rate-limit.ai-chat.retry-after-seconds=${RATE_LIMIT_AI_CHAT_RETRY_AFTER_SECONDS:60}
app.rate-limit.free-trial.limit=${RATE_LIMIT_FREE_TRIAL_LIMIT:30}
app.rate-limit.free-trial.window-seconds=${RATE_LIMIT_FREE_TRIAL_WINDOW_SECONDS:60}
app.rate-limit.free-trial.retry-after-seconds=${RATE_LIMIT_FREE_TRIAL_RETRY_AFTER_SECONDS:30}
app.rate-limit.plus.limit=${RATE_LIMIT_PLUS_LIMIT:120}
app.rate-limit.plus.window-seconds=${RATE_LIMIT_PLUS_WINDOW_SECONDS:60}
app.rate-limit.plus.retry-after-seconds=${RATE_LIMIT_PLUS_RETRY_AFTER_SECONDS:15}
app.rate-limit.pro.limit=${RATE_LIMIT_PRO_LIMIT:600}
app.rate-limit.pro.window-seconds=${RATE_LIMIT_PRO_WINDOW_SECONDS:60}
app.rate-limit.pro.retry-after-seconds=${RATE_LIMIT_PRO_RETRY_AFTER_SECONDS:5}

app.frontend.public-url=${FRONTEND_PUBLIC_URL:https://king-sparkon-tracker.vercel.app}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}
app.frontend.email-verification-url=${FRONTEND_EMAIL_VERIFICATION_URL:http://localhost:3000/verify-email}
app.frontend.login-url=${FRONTEND_LOGIN_URL:http://localhost:3000/login}
app.affiliates.promotion-url-template=${AFFILIATE_PROMOTION_URL_TEMPLATE:${app.frontend.public-url}/pricing?affiliateCode={affiliateCode}}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@kingsparkon-tracker.com}
app.contact.notification-email=${CONTACT_NOTIFICATION_EMAIL:${APP_MAIL_FROM:no-reply@kingsparkon-tracker.com}}

spring.ai.model.chat=${SPRING_AI_CHAT_PROVIDER:ollama}
spring.ai.model.embedding=${SPRING_AI_EMBEDDING_PROVIDER:ollama}
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_CHAT_MODEL:qwen3:4b}
spring.ai.ollama.chat.temperature=${OLLAMA_CHAT_TEMPERATURE:0.3}
spring.ai.ollama.chat.num-ctx=${OLLAMA_NUM_CTX:4096}
spring.ai.ollama.embedding.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
spring.ai.ollama.embedding.num-ctx=${OLLAMA_EMBEDDING_NUM_CTX:2048}
spring.ai.ollama.init.pull-model-strategy=${OLLAMA_PULL_MODEL_STRATEGY:never}
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
spring.ai.openai.chat.temperature=${OPENAI_CHAT_TEMPERATURE:0.3}
spring.ai.openai.embedding.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
spring.ai.openai.embedding.dimensions=${OPENAI_EMBEDDING_DIMENSIONS:768}
spring.ai.vectorstore.pgvector.initialize-schema=${AI_VECTORSTORE_INITIALIZE_SCHEMA:true}
spring.ai.vectorstore.pgvector.index-type=${AI_VECTORSTORE_INDEX_TYPE:HNSW}
spring.ai.vectorstore.pgvector.distance-type=${AI_VECTORSTORE_DISTANCE_TYPE:COSINE_DISTANCE}
spring.ai.vectorstore.pgvector.dimensions=${AI_VECTORSTORE_DIMENSIONS:768}
spring.ai.vectorstore.pgvector.max-document-batch-size=${AI_VECTORSTORE_BATCH_SIZE:1000}
app.ai.chat.provider=${SPRING_AI_CHAT_PROVIDER:ollama}
app.ai.chat.model=${APP_AI_CHAT_MODEL:${OLLAMA_CHAT_MODEL:qwen3:4b}}
app.ai.rag.ingestion.enabled=${AI_RAG_INGESTION_ENABLED:true}
app.ai.rag.top-k=${AI_RAG_TOP_K:5}
app.ai.rag.similarity-threshold=${AI_RAG_SIMILARITY_THRESHOLD:0.55}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:${MAIL_SMTP_STARTTLS:false}}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

paypal.enabled=${PAYPAL_ENABLED:false}
paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.webhook-id=${PAYPAL_WEBHOOK_ID:}
paypal.return-url=${PAYPAL_RETURN_URL:http://localhost:3000/billing/return}
paypal.cancel-url=${PAYPAL_CANCEL_URL:http://localhost:3000/billing/cancel}
paypal.payouts.enabled=${PAYPAL_PAYOUTS_ENABLED:${PAYPAL_ENABLED:false}}
paypal.payouts.currency=${PAYPAL_PAYOUTS_CURRENCY:USD}
paypal.payouts.zar-per-unit=${PAYPAL_PAYOUTS_ZAR_PER_UNIT:0}
paypal.billing.plus-monthly-plan-id=${PAYPAL_BILLING_PLUS_MONTHLY_PLAN_ID:}
paypal.billing.plus-yearly-plan-id=${PAYPAL_BILLING_PLUS_YEARLY_PLAN_ID:}
paypal.billing.pro-monthly-plan-id=${PAYPAL_BILLING_PRO_MONTHLY_PLAN_ID:}
paypal.billing.pro-yearly-plan-id=${PAYPAL_BILLING_PRO_YEARLY_PLAN_ID:}

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.api-key=${STRIPE_API_KEY:${stripe.secret-key}}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:3000/dashboard/owner?billing=stripe-success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/dashboard/owner?billing=stripe-cancelled}

app.business-account.top-up-success-url=${BUSINESS_ACCOUNT_TOP_UP_SUCCESS_URL:http://localhost:3000/dashboard/owner/account?topup=success}
app.business-account.top-up-cancel-url=${BUSINESS_ACCOUNT_TOP_UP_CANCEL_URL:http://localhost:3000/dashboard/owner/account?topup=cancelled}
app.business-account.withdrawal-minimum-zar=${BUSINESS_ACCOUNT_WITHDRAWAL_MINIMUM_ZAR:100}
app.business-account.withdrawal-fee-percent=7.35

# Legacy source-specific withdrawal fees are disabled. The single owner fee is applied above.
app.tips.withdrawal-fee-percent=0.00
app.tips.withdrawal-minimum-zar=${TIPS_WITHDRAWAL_MINIMUM_ZAR:1000}
app.tips.withdrawal-hold-days=${TIPS_WITHDRAWAL_HOLD_DAYS:7}
app.tips.paypal-onboarding-url=${TIPS_PAYPAL_ONBOARDING_URL:http://localhost:3000/dashboard/owner/paypal/onboarding}
app.tips.worker-tip-url-template=${TIPS_WORKER_TIP_URL_TEMPLATE:http://localhost:3000/tips/workers/{workerId}}
app.transactions.withdrawal-minimum-zar=${TRANSACTIONS_WITHDRAWAL_MINIMUM_ZAR:1000}
app.transactions.withdrawal-hold-days=${TRANSACTIONS_HOLD_DAYS:7}
app.transactions.website-withdrawal-fee-percent=0.00
app.transactions.paypal-onboarding-url=${TRANSACTIONS_PAYPAL_ONBOARDING_URL:http://localhost:3000/dashboard/owner/transactions/paypal/onboarding}

app.tickets.withdrawal-fee-percent=0.00
app.tickets.withdrawal-minimum-zar=${TICKETS_WITHDRAWAL_MINIMUM_ZAR:100.00}
app.tickets.checkout-service-fee-percent=${TICKETS_CHECKOUT_SERVICE_FEE_PERCENT:0.00}
app.tickets.promotion-price-zar=${TICKETS_PROMOTION_PRICE_ZAR:1500.00}
app.tickets.observability-retention-days=${TICKETS_OBSERVABILITY_RETENTION_DAYS:90}
