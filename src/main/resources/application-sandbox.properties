# Sandbox profile for Stripe ticket testing.
# Run locally with SPRING_PROFILES_ACTIVE=sandbox and values from .env.sandbox.

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.api-key=${STRIPE_API_KEY:${stripe.secret-key}}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

app.tickets.checkout-success-url=${TICKETS_CHECKOUT_SUCCESS_URL:http://localhost:3000/tickets/my-tickets?stripe=success}
app.tickets.checkout-cancel-url=${TICKETS_CHECKOUT_CANCEL_URL:http://localhost:3000/tickets?stripe=cancelled}
app.tickets.withdrawal-fee-percent=${TICKETS_WITHDRAWAL_FEE_PERCENT:5.00}
app.tickets.withdrawal-minimum-zar=${TICKETS_WITHDRAWAL_MINIMUM_ZAR:100.00}
app.tickets.checkout-service-fee-percent=${TICKETS_CHECKOUT_SERVICE_FEE_PERCENT:0.00}
app.tickets.promotion-price-zar=${TICKETS_PROMOTION_PRICE_ZAR:1500.00}

logging.level.com.king_sparkon_tracker.backend.tickets=DEBUG
