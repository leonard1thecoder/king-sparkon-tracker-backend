name: Agent Apply Patch

on:
  push:
    branches:
      - "agent/production-readiness-phase2"
    paths:
      - ".agent/backend-additions/**"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-readiness-phase2
          fetch-depth: 0
      - name: Apply missing production-readiness source files
        run: |
          set -euo pipefail
          if [ ! -f .agent/backend-additions/READY ]; then
            echo "Compressed additions are still being staged."
            exit 0
          fi
          cat .agent/backend-additions/compressed-part-* | base64 --decode | gzip -d > /tmp/phase2-additions.patch
          git apply --index /tmp/phase2-additions.patch
          rm -rf .agent/backend-additions .agent/backend-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add production integrity domain foundations"
          git push origin HEAD:agent/production-readiness-phase2
