name: Agent Apply Patch

on:
  push:
    branches:
      - "agent/production-readiness-phase2"
    paths:
      - ".agent/backend-patch/**"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-readiness-phase2
          fetch-depth: 0
      - name: Apply production-readiness patch
        run: |
          set -euo pipefail
          cat .agent/backend-patch/part-* | base64 --decode > /tmp/phase2.patch
          git apply --index /tmp/phase2.patch
          rm -rf .agent/backend-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement production integrity foundations"
          git push origin HEAD:agent/production-readiness-phase2
