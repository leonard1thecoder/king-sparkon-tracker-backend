name: Backend Docker CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Create Docker CI env file
        shell: bash
        run: |
          cat > .env.ci <<'EOF'
          SPRING_PROFILES_ACTIVE=test
          APP_JWT_SECRET=ci-local-jwt-secret-must-be-at-least-32-characters
          APP_FRONTEND_BASE_URL=http://localhost:3000
          STRIPE_SECRET_KEY=sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET=whsec_ci_placeholder
          STRIPE_SUCCESS_URL=http://localhost:3000/payment/success
          STRIPE_CANCEL_URL=http://localhost:3000/payment/cancel
          PAYPAL_CLIENT_ID=ci-paypal-client-id
          PAYPAL_CLIENT_SECRET=ci-paypal-client-secret
          PAYPAL_WEBHOOK_ID=ci-paypal-webhook-id
          PAYPAL_RETURN_URL=http://localhost:3000/billing/success
          PAYPAL_CANCEL_URL=http://localhost:3000/billing/cancel
          RATE_LIMIT_BACKEND=memory
          SPRING_DATA_REDIS_HOST=localhost
          SPRING_DATA_REDIS_PORT=6379
          EOF
      - name: Build backend Docker image
        shell: bash
        env:
          DOCKER_BUILDKIT: 1
        run: |
          set +e
          docker build --pull --progress=plain --secret id=app_env,src=.env.ci -t king-sparkon-tracker-backend:${{ github.sha }} . 2>&1 | tee docker-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "--- Docker build failure tail ---"
            tail -n 120 docker-build.log
          fi
          exit "$status"
      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-build-log
          path: docker-build.log
      - name: Inspect backend Docker image
        run: docker image inspect king-sparkon-tracker-backend:${{ github.sha }}
