name: Backend Docker CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Build backend Docker image
        shell: bash
        run: |
          set +e
          docker build --pull --progress=plain -t king-sparkon-tracker-backend:${{ github.sha }} . 2>&1 | tee docker-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "--- Docker build failure tail ---"
            tail -n 120 docker-build.log
          fi
          exit "$status"
      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-build-log
          path: docker-build.log
      - name: Inspect backend Docker image
        run: docker image inspect king-sparkon-tracker-backend:${{ github.sha }}
